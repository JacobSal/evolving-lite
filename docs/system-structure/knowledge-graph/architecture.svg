<svg viewBox="0 0 1800 1300" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#56B6C2"/>
    </marker>
    <filter id="sh" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1800" height="1300" fill="#0D1017"/>

  <g transform="translate(40, 55)">
    <text font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="16" font-weight="600" fill="#56B6C2">&gt;_</text>
    <text x="32" font-size="12" font-weight="600" fill="#56B6C2" letter-spacing="4">OPERATOR REFERENCE PATTERNS</text>
  </g>

  <text x="900" y="110" text-anchor="middle" font-size="36" font-weight="700" fill="#C8D2DC" font-family="'Poppins', system-ui, sans-serif">Unified Knowledge Graph</text>
  <text x="900" y="140" text-anchor="middle" font-size="15" fill="#6b7280">Typed nodes · typed edges · auto-inferred derived views · provenance per edge</text>
  <text x="900" y="162" text-anchor="middle" font-size="12" fill="#4b5563" font-style="italic">Pattern reference for operator-side multi-agent infrastructure</text>

  <!-- CARD 1: NODE + EDGE TAXONOMY -->
  <g transform="translate(40, 195)">
    <rect width="540" height="640" rx="14" fill="#11151c" stroke="#1a1f28" stroke-width="1" filter="url(#sh)"/>
    <text x="24" y="34" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#56B6C2" letter-spacing="2">01 / TAXONOMY</text>
    <text x="24" y="56" font-size="16" font-weight="700" fill="#C8D2DC" font-family="'Poppins', sans-serif">Small fixed vocabulary</text>
    <text x="24" y="78" font-size="11" fill="#6b7280">Type-explosion is the failure mode · resist it</text>

    <line x1="24" y1="92" x2="516" y2="92" stroke="#1a1f28"/>

    <text x="24" y="120" font-size="11" font-weight="700" fill="#9aa5b1" letter-spacing="1">NODE TYPES · 8 total</text>

    <text x="24" y="148" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">command</text>
    <text x="200" y="148" font-size="11" fill="#6b7280" font-style="italic">user-invocable slash command</text>

    <text x="24" y="172" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">skill</text>
    <text x="200" y="172" font-size="11" fill="#6b7280" font-style="italic">loaded behaviour module</text>

    <text x="24" y="196" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">rule</text>
    <text x="200" y="196" font-size="11" fill="#6b7280" font-style="italic">directive the agent follows</text>

    <text x="24" y="220" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">hook</text>
    <text x="200" y="220" font-size="11" fill="#6b7280" font-style="italic">lifecycle-event handler</text>

    <text x="24" y="244" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">agent</text>
    <text x="200" y="244" font-size="11" fill="#6b7280" font-style="italic">subagent profile</text>

    <text x="24" y="268" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">pattern</text>
    <text x="200" y="268" font-size="11" fill="#6b7280" font-style="italic">reusable approach</text>

    <text x="24" y="292" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">decision</text>
    <text x="200" y="292" font-size="11" fill="#6b7280" font-style="italic">recorded architectural choice</text>

    <text x="24" y="316" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">file</text>
    <text x="200" y="316" font-size="11" fill="#6b7280" font-style="italic">regular file (catch-all)</text>

    <line x1="24" y1="345" x2="516" y2="345" stroke="#1a1f28"/>

    <text x="24" y="372" font-size="11" font-weight="700" fill="#9aa5b1" letter-spacing="1">EDGE TYPES · 6 total</text>

    <text x="24" y="400" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">depends-on</text>
    <text x="200" y="400" font-size="11" fill="#6b7280" font-style="italic">requires target to function</text>

    <text x="24" y="424" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">consumes</text>
    <text x="200" y="424" font-size="11" fill="#6b7280" font-style="italic">reads target's output</text>

    <text x="24" y="448" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">mirrors</text>
    <text x="200" y="448" font-size="11" fill="#6b7280" font-style="italic">maintains derived copy</text>

    <text x="24" y="472" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">supersedes</text>
    <text x="200" y="472" font-size="11" fill="#6b7280" font-style="italic">replaces an earlier version</text>

    <text x="24" y="496" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">refines</text>
    <text x="200" y="496" font-size="11" fill="#6b7280" font-style="italic">builds on without replacing</text>

    <text x="24" y="520" font-size="13" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" fill="#C8D2DC">related-to</text>
    <text x="200" y="520" font-size="11" fill="#6b7280" font-style="italic">catch-all · use sparingly</text>

    <line x1="24" y1="552" x2="516" y2="552" stroke="#1a1f28"/>

    <text x="24" y="578" font-size="11" font-weight="700" fill="#9aa5b1" letter-spacing="1">PROVENANCE PER EDGE</text>
    <text x="24" y="600" font-size="12" fill="#C8D2DC">source file · inference rule · timestamp</text>
    <text x="24" y="616" font-size="11" fill="#6b7280" font-style="italic">provenance-less edges are unfalsifiable claims</text>
  </g>

  <!-- CARD 2: INFERENCE + VIEWS -->
  <g transform="translate(630, 195)">
    <rect width="540" height="640" rx="14" fill="#11151c" stroke="#1a1f28" stroke-width="1" filter="url(#sh)"/>
    <text x="24" y="34" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#56B6C2" letter-spacing="2">02 / INFERENCE + VIEWS</text>
    <text x="24" y="56" font-size="16" font-weight="700" fill="#C8D2DC" font-family="'Poppins', sans-serif">Auto-edge inference</text>
    <text x="24" y="78" font-size="11" fill="#6b7280">Edges inferred on write · views computed from stores</text>

    <line x1="24" y1="92" x2="516" y2="92" stroke="#1a1f28"/>

    <rect x="120" y="115" width="300" height="44" rx="6" fill="#0D1017" stroke="#56B6C2" stroke-width="1.5"/>
    <text x="270" y="142" text-anchor="middle" font-size="13" font-weight="600" fill="#C8D2DC">New artefact written</text>
    <line x1="270" y1="160" x2="270" y2="184" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="40" y="186" width="460" height="90" rx="8" fill="#0f1924" stroke="#1a3550" stroke-width="1"/>
    <text x="56" y="208" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">AUTO-EDGE INFERENCE</text>
    <text x="56" y="232" font-size="12" fill="#C8D2DC">parses content · resolves @references</text>
    <text x="56" y="250" font-size="12" fill="#C8D2DC">detects citation patterns · emits typed edges</text>
    <text x="56" y="268" font-size="11" fill="#6b7280" font-style="italic">incremental · sub-50ms per write</text>

    <line x1="160" y1="278" x2="160" y2="304" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="380" y1="278" x2="380" y2="304" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="40" y="306" width="220" height="80" rx="8" fill="#0d2a30" stroke="#56B6C2" stroke-width="1.5"/>
    <text x="150" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">NODES STORE</text>
    <text x="150" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#C8D2DC">typed</text>
    <text x="150" y="370" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">8 types · auto-register on write</text>

    <rect x="280" y="306" width="220" height="80" rx="8" fill="#0d2a30" stroke="#56B6C2" stroke-width="1.5"/>
    <text x="390" y="328" text-anchor="middle" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">EDGES STORE</text>
    <text x="390" y="350" text-anchor="middle" font-size="13" font-weight="600" fill="#C8D2DC">typed + provenance</text>
    <text x="390" y="370" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">6 types · inferred</text>

    <line x1="150" y1="388" x2="150" y2="414" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="390" y1="388" x2="390" y2="414" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="40" y="416" width="460" height="60" rx="8" fill="#0f1924" stroke="#1a3550" stroke-width="1"/>
    <text x="270" y="441" text-anchor="middle" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">DERIVED VIEWS · computed not authored</text>
    <text x="270" y="462" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">always consistent with underlying stores</text>

    <line x1="150" y1="476" x2="100" y2="500" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="270" y1="476" x2="270" y2="500" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>
    <line x1="390" y1="476" x2="440" y2="500" stroke="#56B6C2" stroke-width="1.5" marker-end="url(#arr)"/>

    <rect x="40" y="502" width="140" height="60" rx="6" fill="#11151c" stroke="#9aa5b1" stroke-width="1"/>
    <text x="110" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#C8D2DC">Route index</text>
    <text x="110" y="545" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">router consumer</text>

    <rect x="200" y="502" width="140" height="60" rx="6" fill="#11151c" stroke="#9aa5b1" stroke-width="1"/>
    <text x="270" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#C8D2DC">Detection index</text>
    <text x="270" y="545" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">workflow detection</text>

    <rect x="360" y="502" width="140" height="60" rx="6" fill="#11151c" stroke="#9aa5b1" stroke-width="1"/>
    <text x="430" y="525" text-anchor="middle" font-size="12" font-weight="600" fill="#C8D2DC">Consumer views</text>
    <text x="430" y="545" text-anchor="middle" font-size="10" fill="#6b7280" font-style="italic">audit · removal safety</text>

    <line x1="24" y1="585" x2="516" y2="585" stroke="#1a1f28"/>
    <text x="270" y="608" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">consumers read views, not raw stores</text>
  </g>

  <!-- CARD 3: FAILURE MODES -->
  <g transform="translate(1220, 195)">
    <rect width="540" height="640" rx="14" fill="#11151c" stroke="#1a1f28" stroke-width="1" filter="url(#sh)"/>
    <text x="24" y="34" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#e06c75" letter-spacing="2">03 / FAILURE MODES</text>
    <text x="24" y="56" font-size="16" font-weight="700" fill="#C8D2DC" font-family="'Poppins', sans-serif">How the graph corrodes</text>
    <text x="24" y="78" font-size="11" fill="#6b7280">Six risks the operator must design around</text>

    <line x1="24" y1="92" x2="516" y2="92" stroke="#1a1f28"/>

    <text x="24" y="120" font-size="11" font-weight="700" fill="#e06c75" letter-spacing="1">INFERENCE COST</text>
    <text x="24" y="142" font-size="12" fill="#C8D2DC">Auto-edge inference fires on every write.</text>
    <text x="24" y="160" font-size="11" fill="#6b7280" font-style="italic">Latency cost on operator's edit loop.</text>
    <text x="24" y="176" font-size="11" fill="#9aa5b1">Sub-50ms incremental · not multi-second batch.</text>

    <line x1="24" y1="195" x2="516" y2="195" stroke="#1a1f28"/>

    <text x="24" y="218" font-size="11" font-weight="700" fill="#e06c75" letter-spacing="1">STALE EDGE</text>
    <text x="24" y="240" font-size="12" fill="#C8D2DC">Yesterday's inference may be wrong today.</text>
    <text x="24" y="258" font-size="11" fill="#6b7280" font-style="italic">Source content changed · cited rule renamed.</text>
    <text x="24" y="274" font-size="11" fill="#9aa5b1">Periodic re-scan · freshness signal per edge.</text>

    <line x1="24" y1="293" x2="516" y2="293" stroke="#1a1f28"/>

    <text x="24" y="316" font-size="11" font-weight="700" fill="#e06c75" letter-spacing="1">TYPE EXPLOSION</text>
    <text x="24" y="338" font-size="12" fill="#C8D2DC">Every new type adds maintenance cost.</text>
    <text x="24" y="356" font-size="11" fill="#6b7280" font-style="italic">Resist adding types for every distinction.</text>
    <text x="24" y="372" font-size="11" fill="#9aa5b1">Use field-level discriminator on existing types.</text>

    <line x1="24" y1="391" x2="516" y2="391" stroke="#1a1f28"/>

    <text x="24" y="414" font-size="11" font-weight="700" fill="#e06c75" letter-spacing="1">PROVENANCE COST</text>
    <text x="24" y="436" font-size="12" fill="#C8D2DC">Full provenance doubles storage.</text>
    <text x="24" y="454" font-size="11" fill="#6b7280" font-style="italic">Cheap middle: store rule-id, not full excerpt.</text>
    <text x="24" y="470" font-size="11" fill="#9aa5b1">Audit can still re-derive the excerpt from the rule.</text>

    <line x1="24" y1="489" x2="516" y2="489" stroke="#1a1f28"/>

    <text x="24" y="512" font-size="11" font-weight="700" fill="#e06c75" letter-spacing="1">RELATED-TO BLOAT</text>
    <text x="24" y="534" font-size="12" fill="#C8D2DC">Catch-all edge accumulates noise.</text>
    <text x="24" y="552" font-size="11" fill="#6b7280" font-style="italic">Concrete mitigation: cap at N% of total edges.</text>
    <text x="24" y="568" font-size="11" fill="#9aa5b1">Cap exceeded = inference rules need tightening.</text>

    <line x1="24" y1="587" x2="516" y2="587" stroke="#1a1f28"/>

    <text x="24" y="610" font-size="11" font-weight="700" fill="#e06c75" letter-spacing="1">CROSS-SHARD CONSISTENCY</text>
    <text x="24" y="632" font-size="11" fill="#6b7280" font-style="italic">Sharded graphs need a resolution layer · keep one shard until growth forces split</text>
  </g>

  <!-- BOTTOM: SAFETY PROPERTIES -->
  <g transform="translate(40, 870)">
    <rect width="1720" height="390" rx="14" fill="#11151c" stroke="#1a1f28" stroke-width="1" filter="url(#sh)"/>
    <text x="24" y="34" font-family="ui-monospace, 'JetBrains Mono', Menlo, monospace" font-size="11" font-weight="600" fill="#56B6C2" letter-spacing="2">04 / SAFETY PROPERTIES</text>
    <text x="24" y="56" font-size="16" font-weight="700" fill="#C8D2DC" font-family="'Poppins', sans-serif">Why the structural layer matters for operator-side safety</text>
    <text x="24" y="78" font-size="11" fill="#6b7280">Three properties only an explicit graph provides</text>

    <line x1="24" y1="92" x2="1696" y2="92" stroke="#1a1f28"/>

    <g transform="translate(40, 120)">
      <rect width="520" height="240" rx="8" fill="#0f1924" stroke="#1a3550" stroke-width="1"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">REMOVAL BLAST RADIUS</text>
      <text x="20" y="58" font-size="14" font-weight="600" fill="#C8D2DC" font-family="'Poppins', sans-serif">Know who depends on what</text>
      <text x="20" y="92" font-size="12" fill="#9aa5b1">Before deleting a component, the graph</text>
      <text x="20" y="110" font-size="12" fill="#9aa5b1">tells the operator who else reads it.</text>
      <text x="20" y="146" font-size="12" fill="#9aa5b1">The view that answers this is computed:</text>
      <text x="20" y="164" font-size="12" fill="#9aa5b1">"all nodes with edges pointing here."</text>
      <text x="20" y="200" font-size="11" fill="#6b7280" font-style="italic">Without the graph: grep-and-hope.</text>
      <text x="20" y="218" font-size="11" fill="#6b7280" font-style="italic">With it: removal decision is informed.</text>
    </g>

    <g transform="translate(600, 120)">
      <rect width="520" height="240" rx="8" fill="#0f1924" stroke="#1a3550" stroke-width="1"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">STRUCTURAL DRIFT DETECTION</text>
      <text x="20" y="58" font-size="14" font-weight="600" fill="#C8D2DC" font-family="'Poppins', sans-serif">Orphans surface automatically</text>
      <text x="20" y="92" font-size="12" fill="#9aa5b1">A component in the file system with no</text>
      <text x="20" y="110" font-size="12" fill="#9aa5b1">edges pointing at it is orphaned and</text>
      <text x="20" y="128" font-size="12" fill="#9aa5b1">probably stale.</text>
      <text x="20" y="170" font-size="12" fill="#9aa5b1">Orphan-detection is a daily cron-level</text>
      <text x="20" y="188" font-size="12" fill="#9aa5b1">operation, not a search-and-find exercise.</text>
      <text x="20" y="218" font-size="11" fill="#6b7280" font-style="italic">Unstructured trees never surface orphans.</text>
    </g>

    <g transform="translate(1160, 120)">
      <rect width="520" height="240" rx="8" fill="#0f1924" stroke="#1a3550" stroke-width="1"/>
      <text x="20" y="28" font-size="11" font-weight="700" fill="#56B6C2" letter-spacing="1">CONSUMER-SIDE AUDIT</text>
      <text x="20" y="58" font-size="14" font-weight="600" fill="#C8D2DC" font-family="'Poppins', sans-serif">"What reads X" is a primitive</text>
      <text x="20" y="92" font-size="12" fill="#9aa5b1">Reverse-edge query is a one-call operation.</text>
      <text x="20" y="110" font-size="12" fill="#9aa5b1">Safety tooling on top: removal safety,</text>
      <text x="20" y="128" font-size="12" fill="#9aa5b1">deprecation flow, breaking-change preview.</text>
      <text x="20" y="170" font-size="12" fill="#9aa5b1">Each of those tools is straightforward when</text>
      <text x="20" y="188" font-size="12" fill="#9aa5b1">the reverse-edge primitive exists.</text>
      <text x="20" y="218" font-size="11" fill="#6b7280" font-style="italic">Without it: every audit is an N-way search.</text>
    </g>
  </g>
</svg>
